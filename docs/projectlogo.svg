<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">

  <!-- Background -->
  <rect width="480" height="200" fill="#0d1117" rx="12"/>

  <!-- Device: outer bezel ring -->
  <circle cx="100" cy="100" r="88" fill="#1c2128" stroke="#30363d" stroke-width="3"/>

  <!-- Device: inner screen -->
  <circle cx="100" cy="100" r="72" fill="#0a0f16"/>

  <!-- Device: screen glow (green) -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.5"/>

  <!-- Gauge tick marks: cardinal -->
  <g stroke="#3fb950" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="28" x2="100" y2="40"/>
    <line x1="100" y1="172" x2="100" y2="160"/>
    <line x1="172" y1="100" x2="160" y2="100"/>
    <line x1="28"  y1="100" x2="40"  y2="100"/>
  </g>

  <!-- Gauge tick marks: intercardinal (shorter, dimmer) -->
  <g stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <line x1="151" y1="49"  x2="146" y2="54"/>
    <line x1="151" y1="151" x2="146" y2="146"/>
    <line x1="49"  y1="151" x2="54"  y2="146"/>
    <line x1="49"  y1="49"  x2="54"  y2="54"/>
  </g>

  <!-- hPa label (barometer-style, top of circle) -->
  <text x="100" y="52" text-anchor="middle" font-family="monospace" font-size="9"
        font-weight="bold" fill="#3fb950" opacity="0.8">hPa</text>

  <!-- Battery body outline -->
  <rect x="71" y="88" width="50" height="24" rx="4"
        fill="none" stroke="#3fb950" stroke-width="2.5"/>

  <!-- Positive terminal nub -->
  <rect x="121" y="94" width="8" height="12" rx="2" fill="#3fb950"/>

  <!-- Fill segments: 3 bars (full) -->
  <rect x="76" y="93" width="10" height="14" rx="2" fill="#3fb950"/>
  <rect x="90" y="93" width="10" height="14" rx="2" fill="#3fb950"/>
  <rect x="104" y="93" width="10" height="14" rx="2" fill="#3fb950"/>

  <!-- T · H · P label (below battery) -->
  <text x="96" y="127" text-anchor="middle" font-family="monospace" font-size="9"
        fill="#3fb950" opacity="0.7">T · H · P</text>

  <!-- Text block: project name -->
  <text x="210" y="68" font-family="monospace" font-size="20"
        font-weight="bold" fill="#ffffff">BME280-ESP32-SignalK</text>
  <text x="210" y="94" font-family="monospace" font-size="20"
        font-weight="bold" fill="#3fb950">Gateway</text>

  <!-- Divider line -->
  <line x1="210" y1="105" x2="460" y2="105" stroke="#30363d" stroke-width="1"/>

  <!-- Subtitle lines -->
  <text x="210" y="122" font-family="monospace" font-size="11"
        fill="#8b949e">Marine weather sensor</text>
  <text x="210" y="138" font-family="monospace" font-size="11"
        fill="#8b949e">BME280·ESP32·SignalK·ESP-NOW</text>

  <!-- Badges row -->
  <!-- Weather badge -->
  <rect x="210" y="150" width="68" height="18" rx="4" fill="#1a3a20"/>
  <text x="244" y="163" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#3fb950">Weather</text>

  <!-- ESP-NOW badge -->
  <rect x="284" y="150" width="68" height="18" rx="4" fill="#1a3a20"/>
  <text x="318" y="163" text-anchor="middle" font-family="monospace" font-size="10"
        fill="#3fb950">ESP-NOW</text>

</svg>
